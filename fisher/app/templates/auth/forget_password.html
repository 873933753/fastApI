<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>找回密码</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #e8e8e8;
      font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
    }

    .form {
      width: 280px;
      display: flex;
      flex-direction: column;
    }

    .form input {
      width: 100%;
      height: 42px;
      padding: 0 12px;
      border: 1px solid #c8c8c8;
      background: #f5f5f5;
      font-size: 14px;
      color: #333;
      outline: none;
    }

    .form input::placeholder {
      color: #999;
    }

    .form input:focus {
      border-color: #7eb8e8;
      background: #f0f0f0;
    }

    .form input + input {
      margin-top: -1px;
    }

    .form button {
      width: 100%;
      height: 42px;
      margin-top: 16px;
      border: none;
      background: #6d7f72;
      color: #fff;
      font-size: 15px;
      cursor: pointer;
    }

    .form button:hover {
      background: #5f7164;
    }
  </style>
</head>
<body>
  <form class="form" id="resetForm">
    <input type="password" name="new_password" placeholder="新密码" required>
    <input type="password" name="confirm_password" placeholder="请确认密码" required>
    <button type="submit">找回密码</button>
  </form>
  <script>
    document.getElementById('resetForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const fd = new FormData(e.target);
      const res = await fetch('/web/reset/password/{{ token }}', {
        method: 'POST',
        body: fd,
      });
      const data = await res.json();
      if (!res.ok || data.code !== 0) {  // 按你们 ApiResponse 成功码调整
        alert(data.message || '提交失败');  // 浏览器原生弹窗
        return;
      }
      alert(data.message || '密码重置成功');
      // location.href = '/login';
    });
  </script>
</body>
</html>
