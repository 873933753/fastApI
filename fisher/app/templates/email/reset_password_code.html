<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>邮箱验证码</title>
</head>
<body style="margin:0;padding:0;background-color:#ffffff;">
  <table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0" style="background-color:#ffffff;">
    <tr>
      <td align="center" style="padding:40px 20px;">
        <table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0" style="max-width:560px;border-top:1px solid #e5e7eb;border-bottom:1px solid #e5e7eb;">
          <tr>
            <td align="center" style="padding:72px 24px 80px;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Hiragino Sans GB','Microsoft YaHei',sans-serif;text-align:center;">
              <p style="margin:0 0 28px;font-size:18px;font-weight:700;color:#1a2044;line-height:1.5;">
                你好，{{ user.email }}
              </p>
              <p style="margin:0 0 36px;font-size:15px;font-weight:400;color:#4a5568;line-height:1.5;">
                你的邮箱验证码为：
              </p>
              <p style="margin:0 0 20px;font-size:48px;font-weight:700;color:#1a2044;letter-spacing:4px;line-height:1.2;">
                {{ code }}
              </p>
              <p style="margin:0;font-size:13px;font-weight:400;color:#a0aec0;line-height:1.5;">
                5分钟内有效，请勿向他人泄漏
              </p>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
